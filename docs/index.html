    <!--
      F-01 fix: GitHub Pages does not allow custom HTTP headers, so we ship a
      baseline CSP via <meta>. The policy is intentionally restrictive:
        - default-src 'self': deny everything by default
        - script-src 'self' 'unsafe-inline' is NOT included; we do not use
          any inline scripts (the only inline asset is the data: favicon)
        - style-src allows 'unsafe-inline' for Tailwind v4 utility classes
          that Vite emits as inline <style> blocks during the build
        - img-src 'self' data: https: covers local icons + remote thumbnails
          the user may follow (no third-party image trackers loaded by us)
        - object-src 'none': block plugin abuse (Flash/Java/legacy vectors)
        - base-uri 'self': prevent <base href> injection / DOM clobbering
        - form-action 'self': only same-origin form submissions
      'unsafe-inline' on style is the standard escape hatch documented by
      MDN/OWASP for Tailwind-injected inline styles; it does not weaken
      XSS protection because style-src only governs CSS, not script-src.
      'frame-ancestors' and 'X-Frame-Options' cannot be set via meta and
      are therefore missing here; this is a known GitHub Pages limitation.
    -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self'; base-uri 'self'; form-action 'self'; object-src 'none'">
