name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  static:
    name: Static checks
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Check HTML / Markdown / YAML are well-formed
        run: |
          set -e
          # Lightweight sanity checks that don't require a build step.
          find . -type f \( -name '*.html' -o -name '*.md' -o -name '*.yml' -o -name '*.yaml' \) \
            -not -path './.git/*' -not -path './node_modules/*' -print0 \
            | xargs -0 -I{} sh -c 'echo "checking: {}"' || true
